name: Feature request
description: Propose an enhancement for vScanner
labels: [enhancement]
body:
  - type: markdown
    attributes:
      value: |
        Thanks for sharing your idea. Focus on the problem and measurable value.

  - type: textarea
    id: problem
    attributes:
      label: Problem statement
      description: What problem are you trying to solve?
      placeholder: As a user, I need ... because ...
    validations:
      required: true

  - type: textarea
    id: proposal
    attributes:
      label: Proposed solution
      description: Describe your preferred solution or behavior
    validations:
      required: true

  - type: textarea
    id: alternatives
    attributes:
      label: Alternatives considered
      description: Other options you evaluated and why they are less suitable

  - type: dropdown
    id: area
    attributes:
      label: Area
      options:
        - Scanner engine
        - Dashboard and analytics
        - Reporting and export
        - API
        - Deployment and operations
        - Documentation
    validations:
      required: true

  - type: textarea
    id: acceptance
    attributes:
      label: Acceptance criteria
      description: What should be true when this feature is done?
      placeholder: |
        - [ ] Criterion 1
        - [ ] Criterion 2

  - type: checkboxes
    id: checks
    attributes:
      label: Confirmation
      options:
        - label: I searched existing issues and did not find a duplicate.
          required: true
