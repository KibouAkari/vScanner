name: Question
description: Ask a usage, setup, or architecture question
labels: [question]
body:
  - type: textarea
    id: question
    attributes:
      label: Your question
      description: Be specific about what you want to achieve
      placeholder: How can I ...?
    validations:
      required: true

  - type: textarea
    id: context
    attributes:
      label: Context
      description: What did you try and what happened?
      placeholder: Include scanner mode/profile, endpoint, and environment details

  - type: textarea
    id: code
    attributes:
      label: Relevant config or payload
      description: Paste sanitized snippets only
      render: json

  - type: dropdown
    id: area
    attributes:
      label: Area
      options:
        - Scanner profiles and behavior
        - Dashboard and findings
        - API usage
        - Deployment
        - Testing and development
    validations:
      required: true

  - type: checkboxes
    id: checks
    attributes:
      label: Confirmation
      options:
        - label: I searched existing issues, README, and docs first.
          required: true
