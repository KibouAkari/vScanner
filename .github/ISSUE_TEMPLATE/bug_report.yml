name: Bug report
description: Report a defect, regression, or unexpected behavior
labels: [bug]
body:
  - type: markdown
    attributes:
      value: |
        Thanks for reporting a bug. Please provide enough detail to reproduce it reliably.

  - type: textarea
    id: summary
    attributes:
      label: Summary
      description: Clear and concise description of the bug
      placeholder: What is broken?
    validations:
      required: true

  - type: textarea
    id: steps
    attributes:
      label: Steps to reproduce
      description: Include exact inputs, targets, scanner mode/profile, and commands
      placeholder: |
        1. Open ...
        2. Run scan with ...
        3. Observe ...
    validations:
      required: true

  - type: textarea
    id: expected
    attributes:
      label: Expected behavior
    validations:
      required: true

  - type: textarea
    id: actual
    attributes:
      label: Actual behavior
    validations:
      required: true

  - type: input
    id: version
    attributes:
      label: vScanner version / commit
      placeholder: main@abcdef or release tag

  - type: textarea
    id: environment
    attributes:
      label: Environment
      description: OS, Python version, Nmap version, deployment mode (local/Vercel)
      placeholder: macOS 14, Python 3.11, Nmap 7.95, local

  - type: textarea
    id: logs
    attributes:
      label: Relevant logs or screenshots
      description: Paste sanitized logs or attach screenshots
      render: shell

  - type: checkboxes
    id: checks
    attributes:
      label: Confirmation
      options:
        - label: I searched existing issues and did not find a duplicate.
          required: true
        - label: I removed secrets and sensitive data from this report.
          required: true
